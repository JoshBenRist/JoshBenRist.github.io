<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="styles.css">
        <script src="script.js" defer></script>
    </head>
    <body>
        <div id="reviews">
            <div id="media-name" class="review">
                CONTENT
            </div>
        </div>
        <div class="media-container">
            <div class="tile" data-review="media-name">
                <div class="subtile cover">
                    <image src="" class="album-cover"></image>
                </div>
                <div class="subtile info">
                    Name<br>
                    Artist<br>
                    First Experience | Coming Back to it<br>
                    Date<br>
                </div>
                <div class="subtile notes">
                    <div>
                        Small<br>
                        Short<br>
                        Thoughts<br>
                        <span class="more">More...</span>
                    </div> 
                </div>
            </div>
        </div>
    </body>
</html>
